mode: restart
blueprint:
  name: IKEA BILRESA Dual Button
  author: gribboa
  description: |
    # IKEA BILRESA Dual Button Remote Automation

    ## Current Version 2.0.2

    ## Features

    Simple automation blueprint for IKEA BILRESA dual-button remote.

    ### Supported Actions for Each Button

    * Single Press
    * Double Press
    * Long Press

    ## Changelog
    
    ### 2.0.2
      - Update event types to match my HA integration via Smarthings. Remove support for long press repeats and button-up.
    ### 2.0.1
      - Removed Matter integration filter for button event selector. This will allow users to use the Ikea BILRESA remote over 3rd party Matter integration.
    ### 2.0.0
      - Added support for selecting multiple entities for each button. Allowing to have multiple remotes triggering the same actions.
      - See [these upgrade notes](https://community.home-assistant.io/t/ikea-bilresa-dual-button-remote/965815/28?u=skaronator) for migrating existing automations using this blueprint.
    ### 1.2.2
      - Improved descriptions and documentation.
    ### 1.2.1
      - Improved descriptions for blueprint inputs.
    ### 1.2.0
      - Added max iterations setting for "while holding" actions to prevent infinite loops.
    ### 1.1.0
      - Added "while holding" actions for both buttons with configurable interval.
    ### 1.0.0
      - Initial release with support for all button actions.

    ## Support and Feedback

    * GitHub: [gribboa/home-assistant-blueprints](https://github.com/gribboa/home-assistant-blueprints)
    * Blueprint Exchange: [IKEA BILRESA Dual Button](https://community.home-assistant.io/t/ikea-bilresa-dual-button-remote/965815)

  domain: automation
  source_url: https://raw.githubusercontent.com/gribboa/home-assistant-blueprints/refs/heads/main/automation/ikea-bilresa-dual-button.yaml
  homeassistant:
    min_version: 2025.12.0

  input:
    setup:
      name: ⚙️ Button Setup
      description: >
        Select the event entities for all 2 buttons on the IKEA BILRESA dual-button remote.
      collapsed: true
      input:
        button1_event:
          name: Entity
          description: >
            Select the event entity for Button 1
          selector: &button_event_selector
            entity:
              multiple: true
              filter:
                # Temporary remove due to: https://github.com/Skaronator/home-assistant-blueprints/issues/3
                # integration: matter
                domain: event
                device_class: button

        button2_event:
          name: Entity
          description: >
            Select the event entity for Button 2
          selector: *button_event_selector

    button1:
      name: >
        1️⃣ Button 1 Actions
      description: >
        Define actions when pressing Button 1.
      collapsed: true
      input:
        button1_single:
          name: Single Press
          description: Action for Button 1 single press.
          default: []
          selector:
            action: {}

        button1_double:
          name: Double Press
          description: Action for Button 1 double press.
          default: []
          selector:
            action: {}

        button1_long_press:
          name: Long Press
          description: Action for Button 1 long press.
          default: []
          selector:
            action: {}
        
    button2:
      name: >
        2️⃣ Button 2 Actions
      description: >
        Define actions when pressing Button 2.
      collapsed: true
      input:
        button2_single:
          name: Single Press
          description: Action for Button 2 single press.
          default: []
          selector:
            action: {}

        button2_double:
          name: Double Press
          description: Action for Button 2 double press.
          default: []
          selector:
            action: {}

        button2_long_press:
          name: Long Press
          description: Action for Button 2 long press.
          default: []
          selector:
            action: {}

trigger:
  - platform: state
    id: button1
    entity_id: !input button1_event
  - platform: state
    id: button2
    entity_id: !input button2_event

condition:
  - condition: template
    value_template: >
      {{ trigger.from_state.state not in ['unknown', 'unavailable'] }}
  - condition: template
    value_template: >
      {{ trigger.to_state.state not in ['unknown', 'unavailable'] }}
  - condition: template
    value_template: >
      {{ trigger.from_state.state != trigger.to_state.state }}

action:
  - variables:
      trigger_id: "{{ trigger.id }}"
      press_type: "{{ trigger.to_state.attributes.event_type }}"

  - parallel:
      - choose:
          # Button 1 Actions
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger_id == 'button1' and press_type == 'pushed' }}
            sequence: !input button1_single

          - conditions:
              - condition: template
                value_template: >
                  {{ trigger_id == 'button1' and press_type == 'double' }}
            sequence: !input button1_double

          - conditions:
              - condition: template
                value_template: >
                  {{ trigger_id == 'button1' and press_type == 'held' }}
            sequence: !input button1_long_press

          # Button 2 Actions
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger_id == 'button2' and press_type == 'pushed' }}
            sequence: !input button2_single

          - conditions:
              - condition: template
                value_template: >
                  {{ trigger_id == 'button2' and press_type == 'double' }}
            sequence: !input button2_double

          - conditions:
              - condition: template
                value_template: >
                  {{ trigger_id == 'button2' and press_type == 'held' }}
            sequence: !input button2_long_press
